<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holostim — Аккаунт</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="account.css">
    
    <style>
        /* Дополнительные стили для улучшения интерфейса */
        .rank-title {
            font-size: 14px;
            color: #ffcc33;
            margin: 4px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .xp-text {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        .nav-buttons {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        .nav-btn {
            flex: 1;
            padding: 14px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .nav-btn:hover {
            background: rgba(255,204,51,0.2);
            border-color: #ffcc33;
        }
        
        .nav-btn.ranks {
            background: linear-gradient(90deg, rgba(255,204,51,0.2), rgba(255,159,67,0.2));
            border-color: #ffcc33;
        }
        
        .player-stats {
            display: flex;
            flex-direction: column;
        }
        
        .league-badge {
            background: rgba(255,204,51,0.15);
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,204,51,0.3);
            font-size: 12px;
            color: #ffcc33;
        }
        
        /* Стили для статуса подключения к ПК */
        .pc-status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 20;
            font-size: 12px;
        }
        
        .pc-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }
        
        .pc-status-dot.connected {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .pc-status-dot.searching {
            background: #ffcc33;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .pc-settings-btn {
            background: transparent;
            border: none;
            color: #9aa3b5;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
        
        .pc-settings-btn:hover {
            color: #ffcc33;
        }
    </style>
</head>
<body>

    <div id="account-bg" class="account-bg"></div>

    <div class="hud">

        <!-- Верхняя панель -->
        <div class="hud-top">
            <div class="player-block">
                <div class="player-stats">
                    <div class="nickname" id="nickname">PLAYER</div>
                    <div class="rank-title" id="rankTitle">Начинающий стрелок</div>
                    <div class="league-badge" id="league">Твёрдая рука</div>
                </div>

                <!-- Прогресс XP -->
                <div style="margin-top: 12px;">
                    <div class="xp-bar">
                        <div class="xp-fill" id="xpFill" style="width: 0%;"></div>
                    </div>
                    <div class="xp-text" id="xpText">0 / 100 XP</div>
                </div>
            </div>

            <div class="league-block">
                <div class="league-title">СЛЕДУЮЩЕЕ</div>
                <div class="league-name" id="nextRank">Рекрут</div>
                <div style="font-size: 11px; color: #9aa3b5; margin-top: 4px;" id="xpNeeded">нужно 30 XP</div>
            </div>
        </div>

        <!-- Правая панель (рейтинг) -->
        <div class="hud-right">
            <div class="rating-title">ТОП РЕЙТИНГА</div>
            <div class="rating-list">
                <div class="rating-row">1 · donk666 · 5075</div>
                <div class="rating-row">2 · SEMEN_BAKIN · 4852</div>
                <div class="rating-row">3 · m0NESY · 4790</div>
                <!-- Ссылка на полный рейтинг -->
                <div class="rating-row" style="border-bottom: none; color: #ffcc33; margin-top: 8px; cursor: pointer;" onclick="location.href='ratings.html'">
                    ТВОЁ МЕСТО: <span id="playerRank">#42</span> 👆
                </div>
            </div>

            <!-- Статистика игрока -->
            <div style="margin-top: 16px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                    <span>Сессий:</span>
                    <span id="sessionsCount" style="color: #ffcc33;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>Точность:</span>
                    <span id="accuracy" style="color: #ffcc33;">0%</span>
                </div>
            </div>
        </div>

        <!-- Кнопки навигации (звания и ачивки) -->
        <div class="nav-buttons">
            <button class="nav-btn ranks" onclick="location.href='rank_tree.html'">
                🌳 ЗВАНИЯ
            </button>
            <button class="nav-btn" onclick="location.href='achievements.html'">
                🏆 АЧИВКИ
            </button>
        </div>

        <!-- Кнопка БОЙ -->
        <button class="btn-battle" onclick="startBattle()">
            В БОЙ
        </button>

    </div> <!-- конец hud -->
    <!-- DEV кнопка сброса -->
    <button id="dev-reset-btn" class="dev-reset-btn">
        🔄 Сброс аккаунта
    </button>

    <script src="account.js"></script>

    <script>
        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С HOLOSTIM ПК ==========

        // Функция начала боя - переход на сканирование QR
        function startBattle() {
            window.location.href = 'show-qr.html';
        }

        // Загружаем место в рейтинге (используем другую переменную)
        const savedPlayerRank = localStorage.getItem('player_rating_position');
        if (savedPlayerRank) {
            document.getElementById('playerRank').innerText = '#' + savedPlayerRank;
        }

        // Загружаем статистику с ПК если есть подключение
        async function loadPCStats() {
            const pcIP = localStorage.getItem('holostim_pc_ip');
            if (!pcIP) return;

            try {
                const response = await fetch(`http://${pcIP}:8000/api/session/current`);
                const data = await response.json();

                if (!data.error && data.player_name) {
                    if (data.started) {
                        const notification = document.createElement('div');
                        notification.style.cssText = `
                                position: fixed;
                                top: 80px;
                                left: 20px;
                                right: 20px;
                                background: linear-gradient(90deg, #ffcc33, #ff9f43);
                                color: #000;
                                padding: 12px;
                                border-radius: 999px;
                                text-align: center;
                                font-weight: 600;
                                z-index: 100;
                                box-shadow: 0 4px 20px rgba(0,0,0,0.5);
                            `;
                        notification.innerText = `🎯 Активная сессия: ${data.player_name} (${data.shots} выстрелов)`;
                        document.body.appendChild(notification);
                        setTimeout(() => notification.remove(), 5000);
                    }
                }
            } catch (error) {
                // Игнорируем ошибки
            }
        }

        loadPCStats();

    </script>

</body>
</html>
