<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holostim — Ваш QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle at center, #0a0e1a 0%, #03050a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .player-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,204,51,0.2);
        }
        
        .player-name {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffcc33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        
        .player-id {
            font-size: 12px;
            color: #9aa3b5;
            font-family: monospace;
        }
        
        /* Тонкая рамка с закруглёнными краями */
        .qr-wrapper {
            background: white;
            padding: 8px;  /* Ещё тоньше */
            border-radius: 24px;
            margin: 16px auto;
            box-shadow: 0 0 30px rgba(255,204,51,0.3);
            display: inline-block;
            width: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* УМЕНЬШЕННЫЙ QR-код в 2 раза (было 480px → 240px) */
        #qrcode canvas {
            width: 240px !important;
            height: 240px !important;
            display: block;
            border-radius: 16px;
        }
        
        .status {
            margin: 16px 0;
        }
        
        .status-text {
            font-size: 18px;
            color: #ffcc33;
            font-weight: bold;
            margin-bottom: 6px;
        }
        
        .status-detail {
            font-size: 13px;
            color: #9aa3b5;
        }
        
        .instruction {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            text-align: left;
        }
        
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            font-size: 13px;
            color: #fff;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            background: #ffcc33;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 22px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            z-index: 100;
        }
        
        .back-btn:hover {
            background: rgba(255,204,51,0.3);
            transform: scale(1.05);
        }
        
        .debug-info {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 10px;
            margin-top: 16px;
            font-size: 10px;
            font-family: monospace;
            color: #5f6a7e;
            text-align: left;
            word-break: break-all;
        }
        
        /* Адаптация для очень маленьких экранов */
        @media (max-width: 380px) {
            .container {
                max-width: 320px;
            }
            #qrcode canvas {
                width: 200px !important;
                height: 200px !important;
            }
            .qr-wrapper {
                padding: 6px;
            }
            .player-name {
                font-size: 20px;
            }
        }
        
        /* Анимация для рамки */
        @keyframes subtleGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(255,204,51,0.2);
            }
            70% {
                box-shadow: 0 0 0 6px rgba(255,204,51,0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255,204,51,0);
            }
        }
        
        .qr-wrapper {
            animation: subtleGlow 2s infinite;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <a href="account.html" class="back-btn">←</a>
    
    <div class="container">
        <div class="player-card">
            <div class="player-name" id="playerName">Загрузка...</div>
            <div class="player-id" id="playerId">ID: ---</div>
        </div>
        
        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>
        
        <div class="status">
            <div class="status-text">🎯 Ожидание сканирования</div>
            <div class="status-detail">Поднесите сканер к экрану</div>
        </div>
        
        <div class="instruction">
            <div class="instruction-step">
                <span class="step-number">1</span>
                <span>Держите телефон экраном к сканеру</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">2</span>
                <span>Bluetooth сканер считает QR код</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">3</span>
                <span>Сессия запустится автоматически</span>
            </div>
        </div>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>
    
    <script>
        // Функция транслитерации (русские буквы → латиница)
        function transliterate(name) {
            const map = {
                'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D', 'Е': 'E', 'Ё': 'E',
                'Ж': 'ZH', 'З': 'Z', 'И': 'I', 'Й': 'Y', 'К': 'K', 'Л': 'L', 'М': 'M',
                'Н': 'N', 'О': 'O', 'П': 'P', 'Р': 'R', 'С': 'S', 'Т': 'T', 'У': 'U',
                'Ф': 'F', 'Х': 'H', 'Ц': 'TS', 'Ч': 'CH', 'Ш': 'SH', 'Щ': 'SCH',
                'Ъ': '', 'Ы': 'Y', 'Ь': '', 'Э': 'E', 'Ю': 'YU', 'Я': 'YA',
                'а': 'A', 'б': 'B', 'в': 'V', 'г': 'G', 'д': 'D', 'е': 'E', 'ё': 'E',
                'ж': 'ZH', 'з': 'Z', 'и': 'I', 'й': 'Y', 'к': 'K', 'л': 'L', 'м': 'M',
                'н': 'N', 'о': 'O', 'п': 'P', 'р': 'R', 'с': 'S', 'т': 'T', 'у': 'U',
                'ф': 'F', 'х': 'H', 'ц': 'TS', 'ч': 'CH', 'ш': 'SH', 'щ': 'SCH',
                'ъ': '', 'ы': 'Y', 'ь': '', 'э': 'E', 'ю': 'YU', 'я': 'YA'
            };
            return name.split('').map(char => map[char] || char).join('');
        }
        
        // Получаем данные игрока
        const player = JSON.parse(localStorage.getItem('holostim_player'));
        
        if (!player) {
            console.error('❌ Игрок не найден, перенаправление...');
            window.location.href = 'index.html';
        }
        
        // ============================================
        // ⚡ УПРОЩЁННЫЙ QR-КОД (только латиница и цифры)
        // ============================================
        const playerId = player.id || player.telegram_id || '123456789';
        const rawPlayerName = player.nickname || player.name || 'Player';
        
        // Транслитерация имени (Рон → Ron)
        const playerNameLatin = transliterate(rawPlayerName);
        
        // Убираем всё кроме латиницы и цифр
        const cleanPlayerName = playerNameLatin.replace(/[^a-zA-Z0-9]/g, '');
        
        // Если имя пустое после очистки, используем "Player"
        const finalPlayerName = cleanPlayerName || 'Player';
        
        // ✅ ПРОСТОЙ QR-КОД: holostim://ID/NAME
        // Пример: holostim://123456789/Ron
        const qrData = `holostim://${playerId}/${finalPlayerName}`;
        
        // Отображаем информацию
        document.getElementById('playerName').innerText = rawPlayerName;
        document.getElementById('playerId').innerHTML = `🆔 ID: ${playerId}`;
        
        // Отладочная информация
        document.getElementById('debugInfo').innerHTML = `
            📦 ДАННЫЕ В QR-КОДЕ:<br>
            <strong style="color:#ffcc33; font-size:12px;">${qrData}</strong><br>
            <br>
            ✅ Формат: holostim://ID/ИМЯ<br>
            ✅ Только латиница и цифры<br>
            📏 Длина: ${qrData.length} символов<br>
            📐 Размер QR: 240x240 px (уменьшен в 2 раза)<br>
            🔤 Имя в QR: ${finalPlayerName}
        `;
        
        console.log('✅ Генерация упрощённого QR-кода');
        console.log('📊 Данные:', qrData);
        console.log('📐 Размер QR: 240x240 px');
        
        // Очищаем контейнер
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';
        
        // Создаём УМЕНЬШЕННЫЙ QR-код (240x240)
        try {
            new QRCode(qrContainer, {
                text: qrData,
                width: 240,              // Уменьшено с 480 до 240 (в 2 раза)
                height: 240,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M  // Средний уровень для лучшего сканирования
            });
            console.log('✅ QR-код создан, размер 240x240');
        } catch (error) {
            console.error('❌ Ошибка создания QR:', error);
            document.getElementById('debugInfo').innerHTML += '<br><span style="color:#ff4444;">⚠️ Ошибка генерации QR</span>';
        }
        
        // Проверка создания
        setTimeout(() => {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                console.log('✅ Canvas загружен, размер:', canvas.width, 'x', canvas.height);
            }
        }, 100);
    </script>
</body>
</html>
