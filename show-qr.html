<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holostim — Ваш QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #050810;
            color: white;
            font-family: system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 24px;
            margin: 20px auto;
            box-shadow: 0 0 40px rgba(255,204,51,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            width: fit-content;
        }
        
        /* Основной контейнер QR - увеличиваем размер */
        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Увеличиваем canvas QR-кода */
        #qrcode canvas {
            width: 400px !important;
            height: 400px !important;
            border-radius: 16px;
            display: block;
        }
        
        .status {
            text-align: center;
            margin-top: 30px;
        }
        
        .status-text {
            font-size: 20px;
            color: #ffcc33;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .status-detail {
            font-size: 16px;
            color: #9aa3b5;
        }
        
        .instruction {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            max-width: 350px;
        }
        
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            font-size: 15px;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            background: #ffcc33;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: rgba(255,204,51,0.3);
            transform: scale(1.05);
        }
        
        .connected {
            display: none;
            text-align: center;
        }
        
        .connected.active {
            display: block;
        }
        
        .connected .checkmark {
            font-size: 80px;
            color: #4CAF50;
            animation: pop 0.5s;
        }
        
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .qr-loading {
            text-align: center;
            color: #ffcc33;
            padding: 20px;
        }
        
        .player-info {
            font-size: 20px;
            color: #ffcc33;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 24px;
            border-radius: 40px;
            display: inline-block;
        }

        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            #qrcode canvas {
                width: 320px !important;
                height: 320px !important;
            }
            
            .qr-container {
                padding: 18px;
            }
            
            .status-text {
                font-size: 18px;
            }
            
            .instruction {
                max-width: 280px;
            }
        }
        
        @media (max-width: 450px) {
            #qrcode canvas {
                width: 280px !important;
                height: 280px !important;
            }
        }
        
        /* Анимация пульсации для привлечения внимания */
        @keyframes glow {
            0% { box-shadow: 0 0 0 0 rgba(255,204,51,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255,204,51,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,204,51,0); }
        }
        
        .qr-container {
            animation: glow 2s infinite;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <a href="account.html" class="back-btn">←</a>
    
    <div id="qr-screen" class="qr-screen" style="text-align: center;">
        <div class="player-info" id="player-info"></div>
        
        <div class="qr-container">
            <div id="qrcode"></div>
            <div id="qr-loading" class="qr-loading">Генерация QR кода...</div>
        </div>
        
        <div class="status">
            <div class="status-text">🎯 Ожидание сканирования</div>
            <div class="status-detail">Направьте телефон на камеру ПК</div>
        </div>
        
        <div class="instruction">
            <div class="instruction-step">
                <span class="step-number">1</span>
                <span>Держите телефон экраном к камере</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">2</span>
                <span>Камера на стрелка отсканирует QR</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">3</span>
                <span>QR закроется автоматически</span>
            </div>
        </div>
    </div>
    
    <div id="connected-screen" class="connected">
        <div class="checkmark">✅</div>
        <div style="font-size: 24px; margin: 20px 0;">Подключено!</div>
        <div style="color: #9aa3b5;">Сессия запущена</div>
    </div>
    
    <script>
        // Получаем данные игрока
        const player = JSON.parse(localStorage.getItem('holostim_player'));
        if (!player) {
            window.location.href = 'index.html';
        }
        
        // Данные игрока
        const playerId = player.id || Date.now().toString();
        const playerName = player.nickname || 'Стрелок';
        
        // Показываем информацию об игроке
        document.getElementById('player-info').innerHTML = `🎮 ${playerName}`;
        
        // Формируем данные для QR
        const qrData = `holostim://connect?player_id=${playerId}&player_name=${encodeURIComponent(playerName)}`;
        
        console.log('✅ Данные для QR:', qrData);
        console.log('📊 ID игрока:', playerId);
        console.log('📊 Имя игрока:', playerName);
        
        // Функция для создания увеличенного QR кода
        function generateQRCode(text, containerId) {
            const container = document.getElementById(containerId);
            const loadingEl = document.getElementById('qr-loading');
            
            // Очищаем контейнер
            container.innerHTML = '';
            
            try {
                // Создаём QR код
                const qr = qrcode(0, 'H');
                qr.addData(text);
                qr.make();
                
                // Получаем размер модуля
                const moduleCount = qr.getModuleCount();
                
                // Устанавливаем большой размер QR - 400px
                const qrSize = 400;
                const cellSize = Math.floor(qrSize / moduleCount);
                
                // Создаём canvas с большим размером
                const canvas = document.createElement('canvas');
                canvas.width = qrSize;
                canvas.height = qrSize;
                const ctx = canvas.getContext('2d');
                
                // Заливаем белым фоном
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, qrSize, qrSize);
                
                // Рисуем чёрные квадраты QR кода
                ctx.fillStyle = '#000000';
                for (let row = 0; row < moduleCount; row++) {
                    for (let col = 0; col < moduleCount; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(
                                col * cellSize,
                                row * cellSize,
                                cellSize,
                                cellSize
                            );
                        }
                    }
                }
                
                // Добавляем canvas в контейнер
                container.appendChild(canvas);
                
                // Скрываем загрузку
                loadingEl.style.display = 'none';
                
                console.log('✅ QR код создан! Размер:', qrSize + 'x' + qrSize);
                console.log('📐 Модулей:', moduleCount, 'Размер ячейки:', cellSize + 'px');
                
            } catch (error) {
                console.error('❌ Ошибка создания QR:', error);
                loadingEl.innerHTML = '❌ Ошибка создания QR кода';
                loadingEl.style.color = '#ff4444';
                
                // Запасной вариант
                container.innerHTML = `
                    <div style="
                        width: 400px;
                        height: 400px;
                        background: white;
                        border-radius: 16px;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        text-align: center;
                        color: #000;
                        font-size: 14px;
                        padding: 20px;
                    ">
                        <div style="font-weight: bold; margin-bottom: 10px;">${playerName}</div>
                        <div style="font-size: 11px; word-break: break-all;">ID: ${playerId}</div>
                        <div style="font-size: 10px; margin-top: 15px; color: #666;">Ошибка генерации QR</div>
                    </div>
                `;
                loadingEl.style.display = 'none';
            }
        }
        
        // Запускаем генерацию QR после загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                generateQRCode(qrData, 'qrcode');
            }, 100);
        });
        
        // Функция для проверки подключения
        function checkConnection() {
            // TODO: Здесь будет проверка подключения
        }
        
        setInterval(checkConnection, 2000);
        
    </script>
</body>
</html>
