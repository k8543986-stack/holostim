<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holostim — Ваш QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050810;
            color: white;
            font-family: system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin: 20px;
            box-shadow: 0 0 30px rgba(255,204,51,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #qrcode {
            width: 250px;
            height: 250px;
        }
        
        .status {
            text-align: center;
            margin-top: 30px;
        }
        
        .status-text {
            font-size: 18px;
            color: #ffcc33;
            margin-bottom: 10px;
        }
        
        .status-detail {
            font-size: 14px;
            color: #9aa3b5;
        }
        
        .instruction {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            max-width: 300px;
        }
        
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            background: #ffcc33;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
        }
        
        .connected {
            display: none;
            text-align: center;
        }
        
        .connected.active {
            display: block;
        }
        
        .connected .checkmark {
            font-size: 80px;
            color: #4CAF50;
            animation: pop 0.5s;
        }
        
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .qr-loading {
            text-align: center;
            color: #ffcc33;
            padding: 20px;
        }
        
        .player-info {
            font-size: 16px;
            color: #ffcc33;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
    <!-- Подключаем библиотеку для генерации QR кодов -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <a href="account.html" class="back-btn">←</a>
    
    <div id="qr-screen" class="qr-screen">
        <div class="player-info" id="player-info"></div>
        
        <div class="qr-container">
            <div id="qrcode"></div>
            <div id="qr-loading" class="qr-loading">Генерация QR кода...</div>
        </div>
        
        <div class="status">
            <div class="status-text">🎯 Ожидание сканирования</div>
            <div class="status-detail">Направьте телефон на камеру ПК</div>
        </div>
        
        <div class="instruction">
            <div class="instruction-step">
                <span class="step-number">1</span>
                <span>Держите телефон экраном к камере</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">2</span>
                <span>Камера на стрелка отсканирует QR</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">3</span>
                <span>QR закроется автоматически</span>
            </div>
        </div>
    </div>
    
    <div id="connected-screen" class="connected">
        <div class="checkmark">✅</div>
        <div style="font-size: 24px; margin: 20px 0;">Подключено!</div>
        <div style="color: #9aa3b5;">Сессия запущена</div>
    </div>
    
    <script>
        // Получаем данные игрока
        const player = JSON.parse(localStorage.getItem('holostim_player'));
        if (!player) {
            window.location.href = 'index.html';
        }
        
        // Данные игрока
        const playerId = player.id || Date.now().toString();
        const playerName = player.nickname || 'Стрелок';
        
        // Показываем информацию об игроке
        document.getElementById('player-info').innerHTML = `🎮 ${playerName}`;
        
        // ФОРМИРУЕМ ПРАВИЛЬНЫЕ ДАННЫЕ ДЛЯ QR
        // БЕЗ сессии - сессию создаёт Holostim ПК
        const qrData = `holostim://connect?player_id=${playerId}&player_name=${encodeURIComponent(playerName)}&timestamp=${Date.now()}`;
        
        console.log('📱 Данные для QR (без сессии):', qrData);
        
        // Функция для создания QR кода
        function generateQRCode(text, containerId) {
            const container = document.getElementById(containerId);
            const loadingEl = document.getElementById('qr-loading');
            
            // Очищаем контейнер
            container.innerHTML = '';
            
            try {
                // Создаём QR код с помощью библиотеки
                const qr = qrcode(0, 'H');
                qr.addData(text);
                qr.make();
                
                // Получаем размер модуля
                const moduleCount = qr.getModuleCount();
                const cellSize = Math.floor(250 / moduleCount);
                
                // Создаём canvas для отрисовки
                const canvas = document.createElement('canvas');
                canvas.width = 250;
                canvas.height = 250;
                const ctx = canvas.getContext('2d');
                
                // Рисуем QR код
                for (let row = 0; row < moduleCount; row++) {
                    for (let col = 0; col < moduleCount; col++) {
                        const isBlack = qr.isDark(row, col);
                        ctx.fillStyle = isBlack ? '#000000' : '#ffffff';
                        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                    }
                }
                
                // Добавляем canvas в контейнер
                container.appendChild(canvas);
                
                // Скрываем загрузку
                loadingEl.style.display = 'none';
                
                console.log('✅ QR код создан для игрока:', playerName);
                console.log('📊 ID игрока:', playerId);
                
            } catch (error) {
                console.error('❌ Ошибка создания QR:', error);
                loadingEl.innerHTML = '❌ Ошибка создания QR кода';
                loadingEl.style.color = '#ff4444';
            }
        }
        
        // Запускаем генерацию QR после загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                generateQRCode(qrData, 'qrcode');
            }, 100);
        });
        
        // Функция для проверки подключения
        function checkConnection() {
            // TODO: Здесь будет проверка через сервер Holostim
            // Когда Holostim ПК отсканирует QR и создаст сессию,
            // он должен отправить подтверждение на телефон
        }
        
        // Проверяем подключение каждые 2 секунды
        setInterval(checkConnection, 2000);
        
    </script>
</body>
</html>
