<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holostim — Ваш QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle at center, #0a0e1a 0%, #03050a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .player-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,204,51,0.2);
        }
        
        .player-name {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffcc33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .player-id {
            font-size: 14px;
            color: #9aa3b5;
            font-family: monospace;
        }
        
        /* Тонкая рамка с закруглёнными краями */
        .qr-wrapper {
            background: white;
            padding: 12px;  /* Уменьшено с 20px до 12px - рамка тоньше */
            border-radius: 32px;
            margin: 20px auto;
            box-shadow: 0 0 40px rgba(255,204,51,0.3);
            display: inline-block;
            width: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Увеличенный QR-код */
        #qrcode canvas {
            width: 480px !important;   /* Увеличено с 400px до 480px (+20%) */
            height: 480px !important;
            display: block;
            border-radius: 24px;
        }
        
        .status {
            margin: 20px 0;
        }
        
        .status-text {
            font-size: 20px;
            color: #ffcc33;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .status-detail {
            font-size: 14px;
            color: #9aa3b5;
        }
        
        .instruction {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        
        .instruction-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            font-size: 14px;
            color: #fff;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            background: #ffcc33;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 24px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            z-index: 100;
        }
        
        .back-btn:hover {
            background: rgba(255,204,51,0.3);
            transform: scale(1.05);
        }
        
        .debug-info {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            margin-top: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #5f6a7e;
            text-align: left;
            word-break: break-all;
        }
        
        /* Адаптация для мобильных */
        @media (max-width: 650px) {
            #qrcode canvas {
                width: 420px !important;
                height: 420px !important;
            }
            .qr-wrapper {
                padding: 10px;
            }
        }
        
        @media (max-width: 550px) {
            #qrcode canvas {
                width: 360px !important;
                height: 360px !important;
            }
            .qr-wrapper {
                padding: 8px;
            }
        }
        
        @media (max-width: 450px) {
            #qrcode canvas {
                width: 300px !important;
                height: 300px !important;
            }
            .qr-wrapper {
                padding: 8px;
            }
        }
        
        /* Анимация для рамки */
        @keyframes subtleGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(255,204,51,0.2);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(255,204,51,0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255,204,51,0);
            }
        }
        
        .qr-wrapper {
            animation: subtleGlow 2s infinite;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <a href="account.html" class="back-btn">←</a>
    
    <div class="container">
        <div class="player-card">
            <div class="player-name" id="playerName">Загрузка...</div>
            <div class="player-id" id="playerId">ID: ---</div>
        </div>
        
        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>
        
        <div class="status">
            <div class="status-text">🎯 Ожидание сканирования</div>
            <div class="status-detail">Направьте телефон на камеру ПК</div>
        </div>
        
        <div class="instruction">
            <div class="instruction-step">
                <span class="step-number">1</span>
                <span>Держите телефон экраном к камере</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">2</span>
                <span>Камера Holostim отсканирует QR</span>
            </div>
            <div class="instruction-step">
                <span class="step-number">3</span>
                <span>Сессия запустится автоматически</span>
            </div>
        </div>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>
    
    <script>
        // Получаем данные игрока
        const player = JSON.parse(localStorage.getItem('holostim_player'));
        
        if (!player) {
            console.error('❌ Игрок не найден, перенаправление...');
            window.location.href = 'index.html';
        }
        
        // ============================================
        // ⚡ ТОЛЬКО НУЖНЫЕ ДАННЫЕ В QR-КОД
        // ============================================
        const playerId = player.id || player.telegram_id || '123456789';
        const playerName = player.nickname || player.name || 'Стрелок';
        
        // ✅ ПРАВИЛЬНЫЙ QR-КОД - ТОЛЬКО player_id и player_name
        const qrData = `holostim://connect?player_id=${playerId}&player_name=${encodeURIComponent(playerName)}`;
        
        // Отображаем информацию
        document.getElementById('playerName').innerText = playerName;
        document.getElementById('playerId').innerHTML = `🆔 ID: ${playerId}`;
        
        // Отладочная информация
        document.getElementById('debugInfo').innerHTML = `
            📦 ДАННЫЕ В QR-КОДЕ:<br>
            <strong style="color:#ffcc33;">${qrData}</strong><br>
            <br>
            ✅ Только player_id и player_name<br>
            ❌ Нет session_id, timestamp, version<br>
            📏 Длина: ${qrData.length} символов<br>
            📐 Размер QR: 480x480 px (+20% от оригинала)
        `;
        
        console.log('✅ Генерация QR-кода');
        console.log('📊 Данные:', qrData);
        console.log('📐 Размер QR: 480x480 px');
        
        // Очищаем контейнер
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';
        
        // Создаём увеличенный QR-код
        try {
            new QRCode(qrContainer, {
                text: qrData,
                width: 480,              // Увеличен с 400 до 480 (+20%)
                height: 480,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            console.log('✅ QR-код создан, размер 480x480');
        } catch (error) {
            console.error('❌ Ошибка создания QR:', error);
            document.getElementById('debugInfo').innerHTML += '<br><span style="color:#ff4444;">⚠️ Ошибка генерации QR</span>';
        }
        
        // Проверка создания
        setTimeout(() => {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                console.log('✅ Canvas загружен, размер:', canvas.width, 'x', canvas.height);
            }
        }, 100);
    </script>
</body>
</html>
