<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Holostim — Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- Telegram Mini App SDK (загружается первым) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Основные стили -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Временные стили для видимости */
    * {
      box-sizing: border-box;
    }
    
    /* Для iOS Safari - фикс высоты */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* ===== СТИЛИ ДЛЯ ЧЕКБОКСА СОГЛАСИЯ ===== */
    .consent {
      color: white !important;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .consent:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .consent input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #ffcc33;
      margin: 0;
    }
    
    .consent a {
      color: #ffcc33;
      text-decoration: none;
      margin-left: 5px;
    }
    
    .consent a:hover {
      text-decoration: underline;
    }
    /* ===== КОНЕЦ СТИЛЕЙ ===== */

    /* ===== СТИЛИ ДЛЯ DEV КНОПКИ ===== */
    .dev-reset-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(255, 0, 0, 0.9);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
    }

    .dev-reset-btn:hover {
      background: rgba(255, 0, 0, 1);
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
    }

    .dev-reset-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 480px) {
      .dev-reset-btn {
        bottom: 15px;
        right: 15px;
        padding: 10px 20px;
        font-size: 12px;
      }
    }

    @keyframes devPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 0, 0, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
      }
    }

    .dev-reset-btn.pulse {
      animation: devPulse 2s infinite;
    }
    /* ===== КОНЕЦ СТИЛЕЙ DEV КНОПКИ ===== */

    /* Временная заглушка для функций (пока загружаются скрипты) */
    .function-placeholder {
      display: none;
    }
  </style>
</head>
<body>

<!-- ================= ЭКРАН ОНБОРДИНГА ================= -->
<div id="screen-onboarding" class="screen">
  <div class="onboarding-card">

    <!-- Индикатор шагов -->
    <div class="steps-indicator">
      <span class="step-dot active" data-step="1"></span>
      <span class="step-dot" data-step="2"></span>
      <span class="step-dot" data-step="3"></span>
    </div>

    <!-- Шаг 1 -->
    <div class="onboarding-step active" id="step-gender">
      <h1>Выбери своего бойца</h1>
      <p>Этот выбор определит твой фон</p>

      <div class="wick-gender-screen">
        <img src="assets/img/johnwick_gender.jpg" class="wick-bg" alt="Выбор персонажа">
        <div class="wick-overlay"></div>

        <!-- Убираем onclick из HTML, будем назначать обработчики через JS -->
        <button class="wick-zone wick-male" id="choose-male" aria-label="Выбрать мужского персонажа"></button>
        <button class="wick-zone wick-female" id="choose-female" aria-label="Выбрать женского персонажа"></button>

        <div class="wick-label wick-label-male">МУЖЧИНА</div>
        <div class="wick-label wick-label-female">ДЕВУШКА</div>
      </div>
    </div>

    <!-- Шаг 2 -->
    <div class="onboarding-step" id="step-nickname">
      <h1>Как тебя называть?</h1>
      <p>Этот ник будут видеть в системе</p>

      <input type="text" id="nicknameInput" placeholder="Введите ник" maxlength="20">
      <button class="btn-primary" id="save-nickname-btn">Далее</button>
    </div>

    <!-- Шаг 3 -->
    <div class="onboarding-step" id="step-consent">
      <h1>Почти готово</h1>
      <p>Подтверди согласие на обработку данных</p>

      <label class="consent">
        <input type="checkbox" id="consentCheckbox">
        Я согласен на обработку персональных данных
      </label>

      <button class="btn-primary" id="finishBtn" disabled>
        Создать аккаунт
      </button>
    </div>

  </div>
</div>

<!-- ================= DEV КНОПКА СБРОСА ================= -->
<button id="dev-reset-btn" class="dev-reset-btn">
  🔄 СБРОС АККАУНТА (DEV)
</button>

<!-- ================= ПОДКЛЮЧЕНИЕ СКРИПТОВ ================= -->
<!-- ВАЖНО: правильный порядок загрузки -->
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

<script>
  // Функция для назначения обработчиков событий после загрузки всех скриптов
  function initializeEventListeners() {
    console.log("🔄 Инициализация обработчиков событий...");
    
    // Проверяем, загружены ли все необходимые функции
    if (typeof window.chooseGender !== 'function') {
      console.error("❌ Функция chooseGender не загружена!");
      return;
    }
    
    // Назначаем обработчики для выбора пола
    const maleBtn = document.getElementById('choose-male');
    const femaleBtn = document.getElementById('choose-female');
    
    if (maleBtn) {
      maleBtn.onclick = function(e) {
        e.preventDefault();
        console.log("👆 Клик по мужскому полу");
        window.chooseGender('male');
      };
    }
    
    if (femaleBtn) {
      femaleBtn.onclick = function(e) {
        e.preventDefault();
        console.log("👆 Клик по женскому полу");
        window.chooseGender('female');
      };
    }
    
    // Назначаем обработчик для сохранения ника
    const saveBtn = document.getElementById('save-nickname-btn');
    if (saveBtn && typeof window.saveNickname === 'function') {
      saveBtn.onclick = function(e) {
        e.preventDefault();
        window.saveNickname();
      };
    }
    
    // Назначаем обработчик для завершения регистрации
    const finishBtn = document.getElementById('finishBtn');
    if (finishBtn && typeof window.finishRegistration === 'function') {
      finishBtn.onclick = function(e) {
        e.preventDefault();
        window.finishRegistration();
      };
    }
    
    // Назначаем обработчик для DEV кнопки
    const devBtn = document.getElementById('dev-reset-btn');
    if (devBtn && typeof window.resetAccount === 'function') {
      devBtn.onclick = function(e) {
        e.preventDefault();
        if (confirm('⚠️ Сбросить аккаунт? Весь прогресс будет потерян.')) {
          window.resetAccount();
        }
      };
    }
    
    console.log("✅ Обработчики событий назначены");
  }

  // Ждем загрузки DOM и всех скриптов
  document.addEventListener('DOMContentLoaded', function() {
    console.log("📱 DOM загружен");
    
    // Растягиваем на весь экран в Telegram
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.enableClosingConfirmation();
      tg.setHeaderColor('#050810');
      tg.setBackgroundColor('#050810');
    }
    
    // Фикс для iOS Safari
    function setFullHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      
      const screens = document.querySelectorAll('.screen');
      screens.forEach(screen => {
        screen.style.minHeight = window.innerHeight + 'px';
      });
      
      const cards = document.querySelectorAll('.onboarding-card');
      cards.forEach(card => {
        card.style.minHeight = window.innerHeight + 'px';
      });
    }
    
    setFullHeight();
    window.addEventListener('resize', setFullHeight);
    window.addEventListener('orientationchange', setFullHeight);
    
    // Проверка изображений
    setTimeout(() => {
      const bgImg = document.querySelector('.wick-bg');
      if (bgImg && bgImg.naturalHeight === 0) {
        console.warn('Фоновое изображение не загружено');
        bgImg.style.display = 'none';
        document.querySelector('.wick-gender-screen').style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';
      }
    }, 1000);
    
    // Инициализируем обработчики событий
    // Даем небольшую задержку для загрузки app.js
    setTimeout(initializeEventListeners, 100);
  });

  // Дополнительная проверка после полной загрузки страницы
  window.addEventListener('load', function() {
    console.log("✅ Страница полностью загружена");
    
    // Проверяем наличие функций
    console.log("📋 Проверка функций:", {
      chooseGender: typeof window.chooseGender,
      saveNickname: typeof window.saveNickname,
      finishRegistration: typeof window.finishRegistration,
      resetAccount: typeof window.resetAccount
    });
    
    // Если функции все еще не загружены, пробуем еще раз
    if (typeof window.chooseGender !== 'function') {
      console.warn("⚠️ Функции не загружены, пробуем еще раз...");
      setTimeout(initializeEventListeners, 500);
    }
    
    // Показываем DEV кнопку если режим включен
    if (window.DEV_MODE === true) {
      const devBtn = document.getElementById('dev-reset-btn');
      if (devBtn) {
        devBtn.style.display = 'block';
        devBtn.classList.add('pulse');
        setTimeout(() => {
          devBtn.classList.remove('pulse');
        }, 5000);
      }
    }
  });
</script>

<!-- Экстренный fallback на случай если функции не загрузились -->
<script>
  // Резервный план - если функции не загрузились через обычные обработчики
  document.addEventListener('click', function(e) {
    // Проверяем клик по зонам выбора пола
    if (e.target.classList.contains('wick-male') || e.target.classList.contains('wick-female')) {
      e.preventDefault();
      
      if (typeof window.chooseGender === 'function') {
        const gender = e.target.classList.contains('wick-male') ? 'male' : 'female';
        window.chooseGender(gender);
      } else {
        console.error("❌ chooseGender не определена");
        alert("Ошибка загрузки приложения. Пожалуйста, обновите страницу.");
      }
    }
    
    // Проверяем клик по кнопке сохранения ника
    if (e.target.id === 'save-nickname-btn' || e.target.classList.contains('save-nickname-btn')) {
      e.preventDefault();
      if (typeof window.saveNickname === 'function') {
        window.saveNickname();
      }
    }
    
    // Проверяем клик по кнопке завершения
    if (e.target.id === 'finishBtn') {
      e.preventDefault();
      if (typeof window.finishRegistration === 'function') {
        window.finishRegistration();
      }
    }
  });
</script>

</body>
</html>
