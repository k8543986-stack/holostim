<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Holostim — Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Основные стили -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Временные стили для видимости */
    * {
      box-sizing: border-box;
    }
    
    /* Для iOS Safari - фикс высоты */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* ===== СТИЛИ ДЛЯ ЧЕКБОКСА СОГЛАСИЯ ===== */
    .consent {
      color: white !important;  /* Белый текст */
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .consent:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .consent input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #ffcc33;  /* Золотой цвет для галочки */
      margin: 0;
    }
    
    /* Стили для ссылки на политику (если добавишь) */
    .consent a {
      color: #ffcc33;
      text-decoration: none;
      margin-left: 5px;
    }
    
    .consent a:hover {
      text-decoration: underline;
    }
    /* ===== КОНЕЦ СТИЛЕЙ ===== */

    /* ===== СТИЛИ ДЛЯ DEV КНОПКИ ===== */
    .dev-reset-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(255, 0, 0, 0.9);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none; /* Скрыта по умолчанию, будет показана через JS в DEV_MODE */
    }

    .dev-reset-btn:hover {
      background: rgba(255, 0, 0, 1);
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
    }

    .dev-reset-btn:active {
      transform: scale(0.95);
    }

    /* Стили для мобильных устройств */
    @media (max-width: 480px) {
      .dev-reset-btn {
        bottom: 15px;
        right: 15px;
        padding: 10px 20px;
        font-size: 12px;
      }
    }

    /* Анимация пульсации для привлечения внимания (опционально) */
    @keyframes devPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 0, 0, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
      }
    }

    .dev-reset-btn.pulse {
      animation: devPulse 2s infinite;
    }
    /* ===== КОНЕЦ СТИЛЕЙ DEV КНОПКИ ===== */
  </style>
</head>
<body>

<!-- ================= ЭКРАН ОНБОРДИНГА ================= -->
<div id="screen-onboarding" class="screen">
  <div class="onboarding-card">

    <!-- Индикатор шагов -->
    <div class="steps-indicator">
      <span class="step-dot active" data-step="1"></span>
      <span class="step-dot" data-step="2"></span>
      <span class="step-dot" data-step="3"></span>
    </div>

    <!-- Шаг 1 -->
    <div class="onboarding-step active" id="step-gender">
      <h1>Выбери своего бойца</h1>
      <p>Этот выбор определит твой фон</p>

      <div class="wick-gender-screen">
        <img src="assets/img/johnwick_gender.jpg" class="wick-bg" alt="Выбор персонажа">
        <div class="wick-overlay"></div>

        <button class="wick-zone wick-male"
                onclick="chooseGender('male')"
                aria-label="Выбрать мужского персонажа"></button>

        <button class="wick-zone wick-female"
                onclick="chooseGender('female')"
                aria-label="Выбрать женского персонажа"></button>

        <div class="wick-label wick-label-male">МУЖЧИНА</div>
        <div class="wick-label wick-label-female">ДЕВУШКА</div>
      </div>
    </div>

    <!-- Шаг 2 -->
    <div class="onboarding-step" id="step-nickname">
      <h1>Как тебя называть?</h1>
      <p>Этот ник будут видеть в системе</p>

      <input type="text" id="nicknameInput" placeholder="Введите ник" maxlength="20">
      <button class="btn-primary" onclick="saveNickname()">Далее</button>
    </div>

    <!-- Шаг 3 -->
    <div class="onboarding-step" id="step-consent">
      <h1>Почти готово</h1>
      <p>Подтверди согласие на обработку данных</p>

      <label class="consent">
        <input type="checkbox" id="consentCheckbox">
        Я согласен на обработку персональных данных
      </label>

      <button class="btn-primary" id="finishBtn" disabled
              onclick="finishRegistration()">
        Создать аккаунт
      </button>
    </div>

  </div>
</div>

<!-- ================= DEV КНОПКА СБРОСА ================= -->
<!-- Добавлена после закрывающего тега онбординга, но перед скриптами -->
<button id="dev-reset-btn" class="dev-reset-btn" onclick="resetAccount()">
  🔄 СБРОС АККАУНТА (DEV)
</button>

<!-- ================= ПОДКЛЮЧЕНИЕ ЛОГИКИ ================= -->
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

<script>
  // Инициализация Telegram WebApp
  document.addEventListener('DOMContentLoaded', function() {
    // Растягиваем на весь экран в Telegram
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.enableClosingConfirmation();
      
      // Устанавливаем цвет фона в соответствии с темой Telegram
      tg.setHeaderColor('#050810');
      tg.setBackgroundColor('#050810');
    }
    
    // Фикс для iOS Safari 100vh проблемы
    function setFullHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      
      const screens = document.querySelectorAll('.screen');
      screens.forEach(screen => {
        screen.style.minHeight = window.innerHeight + 'px';
      });
      
      const cards = document.querySelectorAll('.onboarding-card');
      cards.forEach(card => {
        card.style.minHeight = window.innerHeight + 'px';
      });
    }
    
    // Установить высоту при загрузке и изменении размера
    setFullHeight();
    window.addEventListener('resize', setFullHeight);
    window.addEventListener('orientationchange', setFullHeight);
    
    // Проверка изображений (fallback если нет картинок)
    setTimeout(() => {
      const bgImg = document.querySelector('.wick-bg');
      if (bgImg && bgImg.naturalHeight === 0) {
        console.warn('Фоновое изображение не загружено');
        bgImg.style.display = 'none';
        document.querySelector('.wick-gender-screen').style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';
      }
    }, 1000);
  });

  // Дополнительная проверка для DEV режима
  // Если DEV_MODE включен, показываем кнопку с анимацией
  window.addEventListener('load', function() {
    if (window.DEV_MODE === true) {
      const devBtn = document.getElementById('dev-reset-btn');
      if (devBtn) {
        devBtn.classList.add('pulse');
        
        // Убираем пульсацию через 5 секунд
        setTimeout(() => {
          devBtn.classList.remove('pulse');
        }, 5000);
      }
    }
  });
</script>

<!-- Добавляем небольшую защиту от случайного нажатия на DEV кнопку -->
<script>
  // Дополнительная защита для DEV кнопки
  const originalResetAccount = window.resetAccount;
  if (originalResetAccount) {
    window.resetAccount = function() {
      if (confirm('⚠️ ВНИМАНИЕ! ⚠️\n\nВы действительно хотите сбросить аккаунт?\nВесь прогресс будет безвозвратно удалён.')) {
        originalResetAccount();
      }
    };
  }
</script>

</body>
</html>
