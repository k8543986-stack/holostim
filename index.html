<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Holostim — Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  
  <!-- Favicon - принудительно отключаем запрос favicon.ico -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
  
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Основные стили -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Временные стили для видимости */
    * {
      box-sizing: border-box;
    }
    
    /* Для iOS Safari - фикс высоты */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* ===== СТИЛИ ДЛЯ ЧЕКБОКСА СОГЛАСИЯ ===== */
    .consent {
      color: white !important;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .consent:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .consent input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #ffcc33;
      margin: 0;
    }
    /* ===== КОНЕЦ СТИЛЕЙ ===== */
  </style>
</head>
<body>

<!-- ================= ЭКРАН ОНБОРДИНГА ================= -->
<div id="screen-onboarding" class="screen">
  <div class="onboarding-card">

    <!-- Индикатор шагов -->
    <div class="steps-indicator">
      <span class="step-dot active" data-step="1"></span>
      <span class="step-dot" data-step="2"></span>
      <span class="step-dot" data-step="3"></span>
    </div>

    <!-- Шаг 1 -->
    <div class="onboarding-step active" id="step-gender">
      <h1>Выбери своего бойца</h1>
      <p>Этот выбор определит твой фон</p>

      <div class="wick-gender-screen">
        <img src="assets/img/johnwick_gender.jpg" class="wick-bg" alt="Выбор персонажа">
        <div class="wick-overlay"></div>

        <button class="wick-zone wick-male" id="choose-male" onclick="window.chooseGender('male'); return false;" aria-label="Выбрать мужского персонажа"></button>
        <button class="wick-zone wick-female" id="choose-female" onclick="window.chooseGender('female'); return false;" aria-label="Выбрать женского персонажа"></button>

        <div class="wick-label wick-label-male">МУЖЧИНА</div>
        <div class="wick-label wick-label-female">ДЕВУШКА</div>
      </div>
    </div>

    <!-- Шаг 2 -->
    <div class="onboarding-step" id="step-nickname">
      <h1>Как тебя называть?</h1>
      <p>Этот ник будут видеть в системе</p>

      <input type="text" id="nicknameInput" placeholder="Введите ник" maxlength="20">
      <button class="btn-primary" id="save-nickname-btn" onclick="window.saveNickname(); return false;">Далее</button>
    </div>

    <!-- Шаг 3 -->
    <div class="onboarding-step" id="step-consent">
      <h1>Почти готово</h1>
      <p>Подтверди согласие на обработку данных</p>

      <label class="consent">
        <input type="checkbox" id="consentCheckbox">
        Я согласен на обработку персональных данных
      </label>

      <button class="btn-primary" id="finishBtn" disabled onclick="window.finishRegistration(); return false;">
        Создать аккаунт
      </button>
    </div>

  </div>
</div>

<!-- ================= ПОДКЛЮЧЕНИЕ СКРИПТОВ ================= -->
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

<!-- ================= ГАРАНТИРОВАННОЕ ПОЯВЛЕНИЕ КНОПКИ СБРОСА ================= -->
<script>
  (function() {
    // Функция сброса (на случай если в app.js её нет)
    if (typeof window.resetAccount !== 'function') {
      window.resetAccount = function() {
        if (confirm('🔄 Сбросить аккаунт? Весь прогресс будет потерян.')) {
          localStorage.removeItem('holostim_player');
          localStorage.removeItem('holostim_player_temp');
          localStorage.removeItem('player_rating_position');
          window.location.href = 'index.html';
        }
      };
    }
    
    // Создаём кнопку сброса
    function createResetButton() {
      // Проверяем, может уже есть
      let btn = document.getElementById('dev-reset-btn');
      if (btn) {
        btn.remove(); // Удаляем старую
      }
      
      // Создаём новую
      btn = document.createElement('button');
      btn.id = 'dev-reset-btn';
      btn.innerHTML = '🔴 СБРОС АККАУНТА';
      btn.setAttribute('onclick', 'window.resetAccount(); return false;');
      
      // Стили - максимально заметные
      btn.style.cssText = `
        position: fixed !important;
        bottom: 20px !important;
        right: 20px !important;
        z-index: 9999999 !important;
        background: #ff3333 !important;
        color: white !important;
        border: 4px solid white !important;
        border-radius: 60px !important;
        padding: 16px 28px !important;
        font-size: 18px !important;
        font-weight: 900 !important;
        cursor: pointer !important;
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.9) !important;
        display: block !important;
        width: auto !important;
        height: auto !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        text-transform: uppercase !important;
        letter-spacing: 2px !important;
        font-family: Arial, sans-serif !important;
        line-height: normal !important;
        text-shadow: 2px 2px 0px rgba(0,0,0,0.5) !important;
      `;
      
      // Добавляем на страницу
      document.body.appendChild(btn);
      console.log('✅ Кнопка сброса создана и видна!');
      
      // Добавляем пульсацию
      let pulse = 0;
      setInterval(() => {
        pulse = pulse === 0 ? 1 : 0;
        btn.style.transform = pulse ? 'scale(1.1)' : 'scale(1)';
        btn.style.transition = 'transform 0.5s';
      }, 500);
    }
    
    // Создаём кнопку когда страница загрузится
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', createResetButton);
    } else {
      createResetButton();
    }
    
    // И ещё раз через секунду для надёжности
    setTimeout(createResetButton, 1000);
  })();
</script>

<!-- ================= ПРОСТЫЕ ОБРАБОТЧИКИ ================= -->
<script>
  // Настройка чекбокса
  document.addEventListener('DOMContentLoaded', function() {
    // Telegram
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.expand();
    }
    
    // Чекбокс
    const consentCheckbox = document.getElementById('consentCheckbox');
    const finishBtn = document.getElementById('finishBtn');
    
    if (consentCheckbox && finishBtn) {
      consentCheckbox.addEventListener('change', function() {
        finishBtn.disabled = !this.checked;
      });
    }
    
    // Высота для iOS
    const setHeight = () => {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      const screen = document.querySelector('.screen');
      const card = document.querySelector('.onboarding-card');
      if (screen) screen.style.minHeight = window.innerHeight + 'px';
      if (card) card.style.minHeight = window.innerHeight + 'px';
    };
    
    setHeight();
    window.addEventListener('resize', setHeight);
  });
</script>

<!-- Фикс для favicon.ico - перехватываем запрос -->
<script>
  // Это полностью блокирует запрос favicon.ico
  const originalFetch = window.fetch;
  window.fetch = function(url, options) {
    if (url === '/favicon.ico' || url === 'favicon.ico' || url.includes('favicon.ico')) {
      return Promise.resolve(new Response(null, { status: 204 }));
    }
    return originalFetch(url, options);
  };
</script>

</body>
</html>
